<div class="portal-wrapper">
  <div class="login-card">
    <div class="brand-header">
      <img src="/logo.png" alt="VITAL NEXUS Logo" class="brand-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2966/2966327.png'">
      <h2>VITAL<span>NEXUS</span></h2>
    </div>

    <div class="role-toggle">
      <button class="toggle-btn" [class.active]="rolActivo === 'paciente'" (click)="setRol('paciente')">Soy Paciente</button>
      <button class="toggle-btn" [class.active]="rolActivo === 'medico'" (click)="setRol('medico')">Soy Médico</button>
    </div>

    <div class="access-info">
      <p>Ingresa el Número de Seguro Social (NSS) para acceder al expediente.</p>
    </div>

    <form class="auth-form" (ngSubmit)="consultarExpediente()">
      
      <div class="alert alert-error" *ngIf="errorMensaje" style="color: #dc3545; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
        {{ errorMensaje }}
      </div>

      <div class="form-group">
        <label>NSS / CURP</label>
        <input type="text" [(ngModel)]="nss" name="nss" class="form-control" placeholder="Ej. 999-76-6866" required [disabled]="cargando">
      </div>
      
      <button type="submit" class="btn btn-submit btn-nss" [disabled]="cargando || !nss">
        <span *ngIf="!cargando">Consultar Expediente</span>
        <span *ngIf="cargando">Localizando en la red...</span>
      </button>
    </form>
  </div>
</div>
